services:
  postgres:
    image: postgres:16.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pneunexus
      POSTGRES_USER: pneunexus
      POSTGRES_PASSWORD: pneunexus
    ports:
      - "5432:5432"
    volumes:
      - pneunexus-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pneunexus -d pneunexus"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pneunexus-postgres:
